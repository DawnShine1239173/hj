<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dawn Shine 服务器状态</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
body{
    color:#fff;
    padding:40px 20px;
    min-height:100vh;
    background: linear-gradient(#101828, #202b48);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    text-shadow: 0 0 8px #000;
}
.container{max-width:650px;margin:0 auto}
h1{text-align:center;color:#55FFFF;margin-bottom:30px;font-size:24px}
.load{text-align:center;font-size:17px;color:#fff;margin-bottom:20px}
.result{
    background:rgba(0,0,0,0.65);
    padding:25px;border-radius:10px;
    display:none;
    backdrop-filter: blur(6px);
}
.line{margin:16px 0;font-size:16px}
.label{color:#55FFFF;font-weight:bold;width:100px;display:inline-block}
.motd{color:#FFFF55;white-space:pre-line;margin-top:4px}
</style>
</head>
<body>
<div class="container">
    <h1>黎明初露Dawn Shine状态</h1>
    <div class="load" id="loading">正在获取服务器数据...</div>
    <div class="result" id="box">
        <div class="line">
            <span class="label">延迟：</span>
            <span id="ping"></span>
        </div>
        <div class="line">
            <span class="label">游戏版本：</span>
            <span id="v"></span>
        </div>
        <div class="line">
            <span class="label">在线人数：</span>
            <span id="p"></span>
        </div>
        <div class="line">
            <span class="label">服务器标语：</span>
            <div class="motd" id="m"></div>
        </div>
    </div>
</div>
<script>
// 随机背景图（和原版完全一致）
const bgList = [
    "https://ts1.tc.mm.bing.net/th/id/R-C.6a2fd38260df4afecf35942305e4b139?rik=yGc6%2fjceSYdORA&riu=http%3a%2f%2fclubimg.club.vmall.com%2fdata%2fattachment%2fforum%2f201908%2f02%2f105037d08ouxs7rlpe8awf.jpg&ehk=Rw9vUuinRgES6VwiFyiaq9FjCw826FndfUYzhh5%2bm%2b4%3d&risl=&pid=ImgRaw&r=0",
    "https://ts1.tc.mm.bing.net/th/id/OIP-C.PV3mMELfSpi0vDnxiVBfxQHaNK?r=0&dpr=2&pid=ImgDetMain&o=7&rm=3",
    "https://ts1.tc.mm.bing.net/th/id/OIP-C.cqwDlCQ63kidK9qoKK_GkwHaNK?r=0&dpr=2&pid=ImgDetMain&o=7&rm=3",
    "https://picx.zhimg.com/v2-38eaa90f8115355e04d795d6935afa35_r.jpg?source=1940ef5c",
    "https://pic2.zhimg.com/v2-308186f790b6f796e05ed0b996ed2107_r.jpg?source=1940ef5c"
];
document.body.style.backgroundImage = `url(${bgList[Math.floor(Math.random() * bgList.length)]})`;

const loading = document.getElementById('loading');
const box = document.getElementById('box');
// 仅填写域名，全程不暴露数字IP
const serverAddr = "mm.rainplay.cn:46487";

async function getData() {
    try {
        // 更换安全无IP泄露API：mcstatus.io Java版接口
        const api = `https://api.mcstatus.io/v2/status/java/${serverAddr}`;
        const res = await fetch(api);
        const json = await res.json();

        loading.style.display = "none";
        box.style.display = "block";

        // 填充对应数据
        document.getElementById("ping").innerText = `${json.latency}ms`;
        document.getElementById("v").innerText = json.version.name;
        document.getElementById("p").innerText = `${json.players.online}/${json.players.max}`;
        document.getElementById("m").innerText = json.motd.clean;
    } catch (err) {
        loading.innerText = "加载失败";
        console.error(err);
    }
}

window.onload = getData;
// 每60秒自动刷新一次，缩短人数延迟
setInterval(getData, 60000);
</script>
</body>
</html>
