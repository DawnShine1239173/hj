<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>黎明初露𝔻𝕒𝕨𝕟 𝕊𝕙𝕚𝕟𝕖状态</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
body{background:#1a1a2e;color:#fff;padding:40px 20px}
.container{max-width:650px;margin:0 auto}
h1{text-align:center;color:#55FFFF;margin-bottom:30px}
.load{text-align:center;font-size:17px;color:#ccc}
.result{background:#27293d;padding:25px;border-radius:10px;display:none}
.line{margin:16px 0;font-size:16px}
.label{color:#55FFFF;font-weight:bold;width:120px;display:inline-block}
.motd{color:#FFFF55;white-space:pre-line;margin-top:4px}
</style>
</head>
<body>
<div class="container">
    <h1>黎明初露𝔻𝕒𝕨𝕟 𝕊𝕙𝕚𝕟𝕖状态</h1>
    <div class="load" id="loading">正在查询服务器...</div>
    <div class="result" id="box">
        <div class="line">
            <span class="label">服务器延迟：</span>
            <span id="ping"></span>
        </div>
        <div class="line">
            <span class="label">游戏版本：</span>
            <span id="v"></span>
        </div>
        <div class="line">
            <span class="label">在线人数：</span>
            <span id="p"></span>
        </div>
        <div class="line">
            <span class="label">服务器标语：</span>
            <div class="motd" id="m"></div>
        </div>
    </div>
</div>
<script>
const loading = document.getElementById('loading');
const box = document.getElementById('box');
const host = "mm.rainplay.cn:46487";

async function query() {
    try {
        const targetApi = `https://mcping.me/api/java/${host}`;
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(targetApi)}`;
        const res = await fetch(proxy);
        const raw = await res.json();
        const data = JSON.parse(raw.contents);

        loading.style.display = "none";
        box.style.display = "block";
        // 延迟
        document.getElementById("ping").innerText = `${data.ping}ms`;
        // 版本
        document.getElementById("v").innerText = data.version?.name || "未知";
        // 在线人数
        document.getElementById("p").innerText = `${data.players.online}/${data.players.max}`;
        // MOTD标语
        document.getElementById("m").innerText = data.motd?.clean || "无标语";
    } catch (e) {
        loading.innerText = "网络波动，请刷新页面重试";
        console.error(e);
    }
}
window.onload = query;
</script>
</body>
</html>
