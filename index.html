<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MC服务器状态</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #1a1a2e;
            color: #fff;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #55FFFF;
        }
        .loading {
            text-align: center;
            font-size: 18px;
            color: #ccc;
        }
        .result-card {
            background: #27293d;
            border-radius: 10px;
            padding: 25px;
            display: none;
        }
        .info-item {
            margin: 16px 0;
            font-size: 16px;
        }
        .label {
            color: #55FFFF;
            font-weight: bold;
            min-width: 120px;
            display: inline-block;
        }
        .motd {
            white-space: pre-line;
            color: #FFFF55;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Minecraft 服务器状态</h1>
        <div class="loading" id="loading">正在获取服务器数据...</div>
        <div class="result-card" id="resultBox">
            <div class="info-item">
                <span class="label">游戏版本：</span>
                <span id="serverVer"></span>
            </div>
            <div class="info-item">
                <span class="label">在线人数：</span>
                <span id="playerCount"></span>
            </div>
            <div class="info-item">
                <span class="label">服务器标语MOTD：</span>
                <div class="motd" id="serverMotd"></div>
            </div>
        </div>
    </div>

    <script>
        const loading = document.getElementById('loading');
        const resultBox = document.getElementById('resultBox');
        const serverAddr = "mm.rainplay.cn:46487";

        async function getData() {
            try {
                // 无需任何密钥、无需id，直接访问
                const res = await fetch(`https://api.mcsrvstat.us/2/${serverAddr}`);
                const data = await res.json();
                console.log("接口原始数据：", data);

                loading.style.display = "none";
                resultBox.style.display = "block";

                // 字段适配 mcsrvstat 返回结构
                document.getElementById("serverVer").innerText = data.version?.name || "未知";
                document.getElementById("playerCount").innerText = `${data.players.online}/${data.players.max}`;
                document.getElementById("serverMotd").innerText = data.motd?.clean || "无标语";
            } catch (err) {
                loading.innerText = "请求失败，网络延迟，请刷新页面重试";
                console.error(err);
            }
        }

        window.onload = getData;
    </script>
</body>
</html>
